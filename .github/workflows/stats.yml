name: Generate Top Languages

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Create generated folder
        run: mkdir -p generated

      # ================== 🌸 LIGHT MODE ==================

      - name: Light - Languages (Lavender)
        run: |
          curl -s "https://github-readme-stats.vercel.app/api/top-langs/?username=aaryamahajan919&layout=compact&hide_border=true&bg_color=ffffff&title_color=a855f7&text_color=a855f7" > generated/langs-light.svg

      # ================== 🌙 DARK MODE ==================

      - name: Dark - Languages
        run: |
          curl -s "https://github-readme-stats.vercel.app/api/top-langs/?username=aaryamahajan919&layout=compact&theme=tokyonight&hide_border=true" > generated/langs-dark.svg

      # ================== 🚀 COMMIT ==================

      - name: Commit generated files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add generated/langs-*.svg
          git commit -m "Update top languages (lavender theme)" || echo "No changes"
          git push
