name: Generate Lavender Stats

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Create folder
        run: mkdir -p generated

      # 🌸 LIGHT MODE (Lavender)
      - name: Light - GitHub Stats
        run: |
          curl "https://github-readme-stats.vercel.app/api?username=aaryamahajan919&show_icons=true&hide_border=true&bg_color=ffffff&title_color=a855f7&text_color=a855f7&icon_color=c084fc" > generated/stats-light.svg

      - name: Light - Streak
        run: |
          curl "https://streak-stats.demolab.com?user=aaryamahajan919&theme=default&hide_border=true&ring=a855f7&fire=c084fc&currStreakLabel=a855f7&sideNums=a855f7&currStreakNum=a855f7" > generated/streak-light.svg

      - name: Light - Languages
        run: |
          curl "https://github-readme-stats.vercel.app/api/top-langs/?username=aaryamahajan919&layout=compact&hide_border=true&bg_color=ffffff&title_color=a855f7&text_color=a855f7" > generated/langs-light.svg

      # 🌙 DARK MODE (Tokyonight + Lavender)
      - name: Dark - GitHub Stats
        run: |
          curl "https://github-readme-stats.vercel.app/api?username=aaryamahajan919&show_icons=true&theme=tokyonight&hide_border=true" > generated/stats-dark.svg

      - name: Dark - Streak
        run: |
          curl "https://streak-stats.demolab.com?user=aaryamahajan919&theme=tokyonight&hide_border=true&ring=a855f7&fire=c084fc&currStreakLabel=a855f7" > generated/streak-dark.svg

      - name: Dark - Languages
        run: |
          curl "https://github-readme-stats.vercel.app/api/top-langs/?username=aaryamahajan919&layout=compact&theme=tokyonight&hide_border=true" > generated/langs-dark.svg

      - name: Commit files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add generated/*
          git commit -m "Update lavender stats" || echo "No changes"
          git push
