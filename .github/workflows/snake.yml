name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: aaryamahajan919
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#a855f7&color_dots=#f3e8ff,#e9d5ff,#d8b4fe,#c084fc,#a855f7
            dist/github-contribution-grid-snake-dark.svg?color_snake=#c084fc&color_dots=#2e1065,#4c1d95,#7e22ce,#a855f7,#d8b4fe

      - name: Push to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
