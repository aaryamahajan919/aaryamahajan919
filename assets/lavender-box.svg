<svg width="520" height="260" viewBox="0 0 520 260" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EDE7FF"/>
      <stop offset="50%" stop-color="#D8CCFF"/>
      <stop offset="100%" stop-color="#CABDFF"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <!-- Glow -->
  <rect x="10" y="10" width="500" height="240" rx="18"
        fill="#dcd3ff" opacity="0.6" filter="url(#glow)"/>

  <!-- Main Box -->
  <rect x="10" y="10" width="500" height="240" rx="18"
        fill="url(#grad)"/>

</svg>
